<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PetzTipp · Head-to-Head</title>
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" type="image/png" href="img/logo/favicon.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <a href="index.html"><img src="img/logo/tippspiel_logo.png" class="siteLogo" alt="Tippspiel Logo" width="64px"></a>
        <div><h1>PetzTipp</h1><p class="sub">Tippspiel Hub</p></div>
      </div>
      <div class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="games.html" class="nav-link">Tippspiele</a>
        <a href="players.html" class="nav-link">Teilnehmer</a>
        <a href="stats.html" class="nav-link">Statistik</a>
        <a href="worldranking.html" class="nav-link">Weltrangliste</a>
      </div>
    </div>

    <div class="card mt-18">
      <div class="hd">
        <h2>Head-to-Head</h2>
        <p>Direkter Vergleich zweier Spieler über alle Tippspiele.</p>
      </div>
      <div class="bd" style="display:flex; gap:10px; flex-wrap:wrap; align-items:end;">
        <div>
          <label class="small" for="duelA">Spieler A</label>
          <select id="duelA" class="input"></select>
        </div>
        <div>
          <label class="small" for="duelB">Spieler B</label>
          <select id="duelB" class="input"></select>
        </div>
      </div>
    </div>

    <div class="card mt-16">
      <div class="hd"><h2>Ergebnis</h2></div>
      <div class="bd" id="duelResult"></div>
    </div>

    <div class="footer">PetzTipp · © 2026</div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/duels.js"></script>
</body>
</html>
